  #   healthcheck:
  #     test:
  #       - CMD-SHELL
  #       - curl --silent --fail http://localhost:8080 || exit 1
  #     interval: 10s
  #     retries: 10
  #     start_period: 10s
  #     timeout: 5s

  # controller:
  #   image: compose-gateway
